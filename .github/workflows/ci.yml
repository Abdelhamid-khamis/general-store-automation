name: General Store Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # Lint and type-check
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

  # OrangeHRM API Tests (Playwright)
  api-tests:
    name: OrangeHRM API Tests - Recruitment
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run OrangeHRM Recruitment API tests
        run: npm run test:api
        env:
          ORANGEHRM_BASE_URL: https://opensource-demo.orangehrmlive.com
          ORANGEHRM_USERNAME: Admin
          ORANGEHRM_PASSWORD: admin123

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright/
          retention-days: 30

      - name: Upload Playwright JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: reports/playwright-results.json
          retention-days: 30

      - name: Report API test summary
        if: always()
        run: |
          echo "## OrangeHRM API Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | OrangeHRM Demo (opensource-demo.orangehrmlive.com) |" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Playwright + TypeScript |" >> $GITHUB_STEP_SUMMARY
          echo "| Scenarios | Add -> Verify in List -> Delete Candidate |" >> $GITHUB_STEP_SUMMARY
          echo "| Report | Available in Artifacts tab |" >> $GITHUB_STEP_SUMMARY

